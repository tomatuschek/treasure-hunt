<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim & Natascha</title>

  <style>
    :root {
      --bg: #030303;
      --panel: #0a0a0a;
      --panel-2: #0f0f0f;
      --text: #e8e8e8;
      --muted: #8d8d8d;
      --accent: #9dff9d;
      --accent-soft: rgba(157, 255, 157, 0.12);
      --error: #ff5f5f;
      --error-soft: rgba(255, 95, 95, 0.12);
      --border: #222;
      --glow: 0 0 18px rgba(157, 255, 157, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .terminal {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 0 35px rgba(0,0,0,0.45);
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .statusbar {
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .block {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      display: none;
      box-shadow: var(--glow);
    }

    .block.visible {
      display: block;
    }

    .typed-text {
      white-space: pre-wrap;
      line-height: 1.7;
      min-height: 48px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .label {
      margin-top: 18px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    input {
      flex: 1 1 250px;
      min-width: 0;
      background: #000;
      color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit;
      padding: 12px 14px;
      font-size: 16px;
      min-height: 46px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(157,255,157,0.15);
    }

    button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--accent);
      font-family: inherit;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 15px;
      min-height: 46px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    button:hover {
      background: var(--accent-soft);
    }

    .message {
      margin-top: 14px;
      min-height: 24px;
      font-weight: 700;
      letter-spacing: 0.8px;
    }

    .success {
      color: var(--accent);
      text-shadow: 0 0 8px rgba(157,255,157,0.18);
    }

    .error {
      color: var(--error);
      text-shadow: 0 0 8px rgba(255,95,95,0.18);
    }

    .hint-box {
      margin-top: 16px;
      border-left: 3px solid var(--accent);
      padding: 12px 14px;
      background: rgba(157,255,157,0.04);
      color: var(--text);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .terminal {
        padding: 18px;
      }

      .input-row {
        flex-direction: column;
      }

      button,
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="terminal">
    <div class="topbar">
      <div>
        <h1>Tim & Natascha</h1>
        <div class="subtitle">Treasure Hunt // Access Protocol</div>
      </div>
    </div>

    <div id="statusbar" class="statusbar">
      STATUS: WARTET AUF BESTÄTIGUNG
    </div>

    <section id="block1" class="block visible">
      <div id="text1" class="typed-text"></div>
      <div class="actions" id="actions1" style="display:none;">
        <button id="startBtn">JA</button>
      </div>
    </section>

    <section id="block2" class="block">
      <div id="text2" class="typed-text"></div>

      <div id="codeArea" style="display:none;">
        <div class="label">Code</div>
        <div class="input-row">
          <input id="codeInput" type="text" placeholder="Code eingeben">
          <button id="checkBtn">Prüfen</button>
        </div>
        <div id="message" class="message"></div>
      </div>

      <div id="solutionArea" style="display:none;">
        <div class="label">Lösungswort</div>
        <div class="input-row">
          <input id="solutionInput" type="text" placeholder="Lösungswort eingeben">
          <button id="solutionBtn">Prüfen</button>
        </div>
        <div id="solutionMessage" class="message"></div>
      </div>
    </section>

    <section id="block3" class="block">
      <div id="text3" class="typed-text"></div>
    </section>
  </main>

  <script>
    const codeMap = {
      "7mXK-E4qP": `ACCESS GRANTED.

RÄTSEL 1

Euer erster Zielort führt euch an einen Platz,
an dem eure gemeinsame Geschichte einst leise begonnen hat.

Zwischen Wegen, Grün und alten Bäumen
liegt eine Erinnerung an euer erstes Date.

Sucht den Ort,
an dem ihr euch im Schlosspark Stammheim wiederfinden könnt.

Dort wartet der nächste Code.`,

      "A9rN-A2Ld": `ACCESS GRANTED.

RÄTSEL 2

Die nächste Spur führt euch zu einem Ort,
der einmal zu Nataschas Alltag gehörte.

Nicht nur vier Wände,
sondern auch Wasser spielte dort eine Rolle.

Sucht Nataschas alte Wohnung
und die dazugehörige Schwimmanlage.

Dort findet ihr den nächsten Code.`,

      "p5TN-G8sQ": `ACCESS GRANTED.

RÄTSEL 3

Der dritte Hinweis bringt euch an einen Ort,
an dem man nicht nur zusammensitzt,
sondern Geschichten teilt, anstößt
und Erinnerungen wachsen lässt.

Folgt der Spur
zur Bar von Tims Eltern.

Dort wartet der nächste Code.`,

      "Z4wA-N6kR": `ACCESS GRANTED.

RÄTSEL 4

Noch ein Ort fehlt euch auf eurem Weg:
hoch hinaus, mit Blick über die Umgebung,
ein markanter Punkt, den man nicht einfach übersieht.

Sucht den Funkenturm in Opladen.

Wenn ihr dort wart, habt ihr alle vier Schlüssel gefunden.

Doch der nächste Zugangscode ist an keinem Ort versteckt.
Ihr hattet ihn bereits die ganze Zeit bei euch.

Schaut euch eure bisherigen Codes genau an.
Im Herzen jedes Codes liegt ein Teil der Lösung.

Findet das deutsche Lösungswort und gebt es unten ein.`
    };

    const finalAnswers = ["erinnerung", "erinnerungen"];

    const introText =
`Willkommen.

Wenn ihr diese Seite gefunden habt, hat eure Suche begonnen.

Vor euch liegt ein Weg aus Spuren, Orten und Erinnerungen.
Jeder gefundene QR-Code bringt euch der nächsten Station näher.

Seid ihr bereit, den Schatz zu suchen?`;

    const startText =
`PROTOKOLL AKTIVIERT.

Gebt den gefundenen Code ein, um das nächste Rätsel freizuschalten.

Hinweis:
Nur gültige Zugangscodes öffnen den nächsten Abschnitt.`;

    const finalText =
`ACCESS GRANTED.

RÄTSEL 6

Ihr habt den letzten Zugang erfolgreich entschlüsselt.

Nun führt euch die letzte Spur an den Ort,
an dem die Truhe auf euch wartet.

Hier kommt später der finale Hinweis zur versteckten Truhe hinein.

Sobald dieser Text final ist,
können darunter zusätzlich eure Bilder erscheinen.`;

    function typeText(element, text, speed = 22, callback = null) {
      element.innerHTML = "";
      let i = 0;

      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "█";
      element.appendChild(cursor);

      const interval = setInterval(() => {
        if (i < text.length) {
          cursor.remove();
          element.append(document.createTextNode(text.charAt(i)));
          element.appendChild(cursor);
          i++;
        } else {
          clearInterval(interval);
          cursor.remove();
          if (callback) callback();
        }
      }, speed);
    }

    function normalizeInput(value) {
      return value.trim();
    }

    function normalizeLower(value) {
      return value.trim().toLowerCase();
    }

    function setStatus(text, isError = false) {
      const statusbar = document.getElementById("statusbar");
      statusbar.textContent = text;
      statusbar.style.color = isError ? "var(--error)" : "var(--muted)";
      statusbar.style.borderColor = isError ? "rgba(255,95,95,0.35)" : "var(--border)";
    }

    function showMainText(text, callback = null) {
      const block3 = document.getElementById("block3");
      block3.classList.add("visible");
      typeText(document.getElementById("text3"), text, 20, callback);
    }

    window.addEventListener("load", () => {
      typeText(document.getElementById("text1"), introText, 20, () => {
        document.getElementById("actions1").style.display = "flex";
        setStatus("STATUS: BEREIT");
      });
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      const block2 = document.getElementById("block2");
      block2.classList.add("visible");

      typeText(document.getElementById("text2"), startText, 20, () => {
        document.getElementById("codeArea").style.display = "block";
        document.getElementById("codeInput").focus();
        setStatus("STATUS: EINGABE AKTIV");
      });
    });

    function flashMessage(element, text, success = true) {
      element.textContent = text;
      element.className = success ? "message success" : "message error";
    }

    function checkCode() {
      const input = document.getElementById("codeInput");
      const message = document.getElementById("message");
      const solutionArea = document.getElementById("solutionArea");
      const solutionInput = document.getElementById("solutionInput");
      const solutionMessage = document.getElementById("solutionMessage");
      const value = normalizeInput(input.value);

      if (codeMap[value]) {
        flashMessage(message, "ACCESS GRANTED", true);
        setStatus("STATUS: ZUGANG GEWÄHRT");
        input.value = "";
        solutionMessage.textContent = "";

        showMainText(codeMap[value], () => {
          if (value === "Z4wA-N6kR") {
            solutionArea.style.display = "block";
            solutionInput.focus();
          } else {
            solutionArea.style.display = "none";
          }
        });
      } else {
        flashMessage(message, "ACCESS DENIED", false);
        setStatus("STATUS: ZUGANG VERWEIGERT", true);
      }
    }

    function checkSolution() {
      const input = document.getElementById("solutionInput");
      const message = document.getElementById("solutionMessage");
      const value = normalizeLower(input.value);

      if (finalAnswers.includes(value)) {
        flashMessage(message, "ACCESS GRANTED", true);
        setStatus("STATUS: LÖSUNG AKZEPTIERT");
        input.value = "";
        showMainText(finalText);
      } else {
        flashMessage(message, "ACCESS DENIED", false);
        setStatus("STATUS: FALSCHE LÖSUNG", true);
      }
    }

    document.getElementById("checkBtn").addEventListener("click", checkCode);
    document.getElementById("solutionBtn").addEventListener("click", checkSolution);

    document.getElementById("codeInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkCode();
      }
    });

    document.getElementById("solutionInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkSolution();
      }
    });
  </script>
</body>
</html>
