<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim & Natascha</title>

  <style>
    :root {
      --bg: #050505;
      --panel: #0b0b0b;
      --text: #e8e8e8;
      --muted: #9a9a9a;
      --accent: #b7ffb7;
      --error: #ff6b6b;
      --border: #262626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .terminal {
      width: 100%;
      max-width: 820px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.45);
      padding: 24px;
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .block {
      margin-top: 22px;
      padding: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.01);
      display: none;
    }

    .block.visible {
      display: block;
    }

    .typed-text {
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 48px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--accent);
      font-family: inherit;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 15px;
      min-height: 44px;
    }

    button:hover {
      background: rgba(183, 255, 183, 0.08);
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    input {
      flex: 1 1 240px;
      min-width: 0;
      background: #000;
      color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit;
      padding: 12px 14px;
      font-size: 16px;
      min-height: 44px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .message {
      margin-top: 14px;
      min-height: 24px;
      font-weight: 700;
    }

    .success {
      color: var(--accent);
    }

    .error {
      color: var(--error);
    }

    .label {
      margin-top: 18px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .terminal {
        padding: 18px;
      }

      .block {
        padding: 14px;
      }

      .input-row {
        flex-direction: column;
      }

      button,
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="terminal">
    <div class="header">
      <h1>Tim & Natascha</h1>
      <div class="subtitle">Treasure Hunt // Access Protocol</div>
    </div>

    <section id="block1" class="block visible">
      <div id="text1" class="typed-text"></div>
      <div class="actions" id="actions1" style="display:none;">
        <button id="startBtn">JA</button>
      </div>
    </section>

    <section id="block2" class="block">
      <div id="text2" class="typed-text"></div>

      <div id="codeArea" style="display:none;">
        <div class="label">CODE</div>
        <div class="input-row">
          <input id="codeInput" type="text" placeholder="Code eingeben">
          <button id="checkBtn">PRÜFEN</button>
        </div>
        <div id="message" class="message"></div>
      </div>

      <div id="solutionArea" style="display:none;">
        <div class="label">LÖSUNGSWORT</div>
        <div class="input-row">
          <input id="solutionInput" type="text" placeholder="Lösungswort eingeben">
          <button id="solutionBtn">PRÜFEN</button>
        </div>
        <div id="solutionMessage" class="message"></div>
      </div>
    </section>

    <section id="block3" class="block">
      <div id="text3" class="typed-text"></div>
    </section>
  </main>

  <script>
    const codeMap = {
      "7mXK-E4qP": `Code akzeptiert.

TBD
TBD
TBD

Gebt nun den nächsten Code ein.`,

      "A9rN-A2Ld": `Code akzeptiert.

TBD
TBD
TBD

Gebt nun den nächsten Code ein.`,

      "p5TN-G8sQ": `Code akzeptiert.

TBD
TBD
TBD

Gebt nun den nächsten Code ein.`,

      "Z4wA-N6kR": `Ihr habt alle vier Codes gefunden.

Doch nun benötigt ihr einen weiteren Code.
Diesen werdet ihr jedoch an keinem Ort finden.

Tatsächlich hattet ihr ihn bereits die ganze Zeit vor euch.
Schaut euch eure bisherigen Codes genau an.

TBD

Gebt das deutsche Lösungswort ein.`
    };

    const finalAnswers = ["erinnerung", "erinnerungen"];

    const introText =
`Willkommen.
Wenn ihr diese Seite gefunden habt, hat eure Suche begonnen.

Seid ihr bereit, den Schatz zu suchen?`;

    const startText =
`Gut.

Dann beginnt jetzt eure Reise.
Gebt den gefundenen Code ein, um den nächsten Hinweis freizuschalten.`;

    const finalText =
`ZUGANG GEWÄHRT.

TBD
TBD
TBD`;

    function typeText(element, text, speed = 22, callback = null) {
      element.innerHTML = "";
      let i = 0;

      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "█";
      element.appendChild(cursor);

      const interval = setInterval(() => {
        if (i < text.length) {
          cursor.remove();
          element.append(document.createTextNode(text.charAt(i)));
          element.appendChild(cursor);
          i++;
        } else {
          clearInterval(interval);
          cursor.remove();
          if (callback) callback();
        }
      }, speed);
    }

    function normalizeInput(value) {
      return value.trim();
    }

    function normalizeLower(value) {
      return value.trim().toLowerCase();
    }

    function showMainText(text, callback = null) {
      const block3 = document.getElementById("block3");
      block3.classList.add("visible");
      typeText(document.getElementById("text3"), text, 22, callback);
    }

    window.addEventListener("load", () => {
      typeText(document.getElementById("text1"), introText, 22, () => {
        document.getElementById("actions1").style.display = "flex";
      });
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      const block2 = document.getElementById("block2");
      block2.classList.add("visible");

      typeText(document.getElementById("text2"), startText, 22, () => {
        document.getElementById("codeArea").style.display = "block";
        document.getElementById("codeInput").focus();
      });
    });

    function checkCode() {
      const input = document.getElementById("codeInput");
      const message = document.getElementById("message");
      const solutionArea = document.getElementById("solutionArea");
      const value = normalizeInput(input.value);

      if (codeMap[value]) {
        message.textContent = "CODE KORREKT";
        message.className = "message success";
        input.value = "";

        showMainText(codeMap[value], () => {
          if (value === "Z4wA-N6kR") {
            solutionArea.style.display = "block";
            document.getElementById("solutionInput").focus();
          } else {
            solutionArea.style.display = "none";
          }
        });
      } else {
        message.textContent = "FALSCHER CODE";
        message.className = "message error";
      }
    }

    function checkSolution() {
      const input = document.getElementById("solutionInput");
      const message = document.getElementById("solutionMessage");
      const value = normalizeLower(input.value);

      if (finalAnswers.includes(value)) {
        message.textContent = "LÖSUNG KORREKT";
        message.className = "message success";
        input.value = "";
        showMainText(finalText);
      } else {
        message.textContent = "FALSCHES LÖSUNGSWORT";
        message.className = "message error";
      }
    }

    document.getElementById("checkBtn").addEventListener("click", checkCode);
    document.getElementById("solutionBtn").addEventListener("click", checkSolution);

    document.getElementById("codeInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkCode();
      }
    });

    document.getElementById("solutionInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkSolution();
      }
    });
  </script>
</body>
</html>
