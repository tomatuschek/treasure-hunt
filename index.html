<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim & Natascha</title>

  <style>
    :root {
      --bg: #030303;
      --panel: #0a0a0a;
      --panel-2: #0f0f0f;
      --text: #e8e8e8;
      --muted: #8d8d8d;
      --accent: #9dff9d;
      --accent-soft: rgba(157, 255, 157, 0.12);
      --error: #ff5f5f;
      --border: #222;
      --glow: 0 0 18px rgba(157, 255, 157, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .terminal {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 0 35px rgba(0,0,0,0.45);
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .statusbar {
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
    }

    .block {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      display: none;
      box-shadow: var(--glow);
    }

    .block.visible {
      display: block;
    }

    .typed-text {
      white-space: pre-wrap;
      line-height: 1.7;
      min-height: 48px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .label {
      margin-top: 18px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    input {
      flex: 1 1 250px;
      min-width: 0;
      background: #000;
      color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit;
      padding: 12px 14px;
      font-size: 16px;
      min-height: 46px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(157,255,157,0.15);
    }

    button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--accent);
      font-family: inherit;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 15px;
      min-height: 46px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--accent-soft);
    }

    .message {
      margin-top: 14px;
      min-height: 24px;
      font-weight: 700;
      letter-spacing: 0.8px;
    }

    .success {
      color: var(--accent);
      text-shadow: 0 0 8px rgba(157,255,157,0.18);
    }

    .error {
      color: var(--error);
      text-shadow: 0 0 8px rgba(255,95,95,0.18);
    }

    .transition-text {
      color: var(--accent);
      white-space: pre-wrap;
      line-height: 1.6;
      margin-top: 8px;
      opacity: 0.9;
    }

    @media (max-width: 640px) {
      .terminal {
        padding: 18px;
      }

      .input-row {
        flex-direction: column;
      }

      button,
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="terminal">
    <div class="topbar">
      <div>
        <h1>Tim & Natascha</h1>
        <div class="subtitle">Treasure Hunt // Access Protocol</div>
      </div>
    </div>

    <div id="statusbar" class="statusbar">
      STATUS: WARTET AUF BESTÄTIGUNG
    </div>

    <section id="block1" class="block visible">
      <div id="text1" class="typed-text"></div>
      <div class="actions" id="actions1" style="display:none;">
        <button id="startBtn">JA</button>
      </div>
    </section>

    <section id="block2" class="block">
      <div id="text2" class="typed-text"></div>

      <div id="codeArea" style="display:none;">
        <div class="label">Code</div>
        <div class="input-row">
          <input id="codeInput" type="text" placeholder="Code eingeben">
          <button id="checkBtn">Prüfen</button>
        </div>
        <div id="message" class="message"></div>
      </div>

      <div id="solutionArea" style="display:none;">
        <div class="label">Lösungswort</div>
        <div class="input-row">
          <input id="solutionInput" type="text" placeholder="Lösungswort eingeben">
          <button id="solutionBtn">Prüfen</button>
        </div>
        <div id="solutionMessage" class="message"></div>
      </div>
    </section>

    <section id="block3" class="block">
      <div id="text3" class="typed-text"></div>
    </section>
  </main>

  <script>
    const codeMap = {
      "7mXK-E4qP": `RÄTSEL 2: [LÖSUNG: A9rN-A2Ld]

Es gibt rote.
Es gibt blaue.
Es gibt rosa.

Es gibt einen von Alexandre Gustave
Es gibt einen Schiefen
Und vielleicht auch von Babel.

Ein Schild vor dem Parkplatz, Die Rückseite wird euch den Code verraten`,

      "A9rN-A2Ld": `RÄTSEL 3: [LÖSUNG: p5TN-G8sQ]

Der Ort, an dem alles begann.

Sucht das Werk von Barbara Haiduck, ist das etwa Timmy??
Ein paar Schritte südöstlich, mit dem Blick weg vom Wasser.
So schöne Bäume, was hier wohl einst war?
Eine Informationstafel, doch ganz ohne Inhalt.
Oder findet ihr doch irgendwo einen Code?`,

      "p5TN-G8sQ": `RÄTSEL 4: [LÖSUNG: Z4wA-N6kR]

Für den nächsten Code müsst ihr an einen Ort,
an dem Gastfreundschaft kein Ereignis,
sondern Gewohnheit ist.

Dort gibt es einen Raum,
der nicht vom Himmel erhellt wird,
und doch die Farbe der Sonne trägt.

Wenn ihr ihn gefunden habt,
sucht den Platz,
an dem Gläser gefüllt,
Gespräche geführt
und Abende verlängert werden.

Der nächste Code wartet nicht darauf,
sondern darunter.`,

      "Z4wA-N6kR": `RÄTSEL 5: [LÖSUNG: Erinnerung / Erinnerungen – unabhängig von groß und klein schreibung]

Vier Schlüssel habt ihr gefunden.
Doch der letzte Zugang wurde euch nie gegeben.

Das liegt daran, dass ihr ihn bereits besitzt.

Kehrt zurück zu den vier Zeichenfolgen,
die euch bis hierher geführt haben.

Lest nicht ihren Anfang.
Lest nicht ihr Ende.
Betrachtet nur das,
was jede von ihnen in ihrer Mitte trägt.

Fügt diese vier Fragmente zusammen.

So entsteht ein Wort –
allerdings nicht in eurer Sprache.

Übersetzt es.

Dann kennt ihr das Lösungswort.`
    };

    const finalAnswers = ["erinnerung", "erinnerungen"];

    const introText = `Einführung:

Willkommen, Tim und Natascha.

Zunächst einmal: Herzlichen Glückwunsch zu eurer Hochzeit! Eure Freunde haben ein Geschenk für euch vorbereitet, und mich beauftragt euch dieses zu überreichen. Aber ihr glaubt hoffentlich nicht, dass ihr es einfach so, ohne jegliche Mühe, in Empfang nehmen dürft?

Nope.

Denn ich, Ignacio Acertijo, habe für euch ein kleines Spiel vorbereitet.
Genauer gesagt: eine Prüfung eurer Erinnerung, eures Scharfsinns und eurer Fähigkeit, gemeinsam ans Ziel zu kommen.

Bei jedem Rätsel ist ein Ort gesucht, ggf. gibt es einen weiteren Hinweis, der diesen Ort genauer eingrenzt. Wenn ihr den Ort wisst, müsst ihr gemeinsam hin, dort werdet ihr einen Code finden, der euch zum nächsten Abschnitt führt.

Doch das allein genügt nicht.
An jedem gefundenen Ort müsst ihr außerdem ein gemeinsames Selfie machen und dieses an folgende Adresse senden:
ignacio.acertijo@posteo.de

Solltet ihr an einem Rätsel vollständig scheitern, dürft ihr ebenfalls an diese Adresse schreiben und euer Versagen eingestehen.
Vielleicht erbarme ich mich dann und sende euch einen weiteren Hinweis.

Also:
Seid ihr bereit, das Spiel zu spielen?`;

    const startText = `RÄTSEL 1: [LÖSUNG: 7mXK-E4qP]

Jede Suche beginnt dort,
wo etwas bereits existierte,
lange bevor ihr beide gemeinsam auf Schatzjagd gehen würdet.

Euer erster Zielort gehört zur Vergangenheit von ...
Früher war er vertraut, alltäglich, beinahe unscheinbar.
Heute ist er nur noch für jene bedeutend,
die wissen, wonach sie suchen.

Doch Vorsicht:
Die Lösung liegt nicht an der Tür und nicht im Inneren.
Ihr müsst dorthin,
wo Wohnen und Wasser Nachbarn sind.

Wenn ihr den richtigen Ort gefunden habt,
haltet Ausschau nach einer Straßenlaterne, in der Nähe des Eingangs.
Dort verbirgt sich euer erster Code.`;

    const finalText = `RÄTSEL 6: (vorab Text bis Selfies geprüft wurden): 

Ihr habt es geschafft.

Alle vier Stationen liegen hinter euch – sehr gut.

Doch bevor das letzte Rätsel erscheint,
muss ich zunächst überprüfen,
ob ihr die Orte auch wirklich besucht habt.

Schickt mir eure Selfies.

Besteht ihr die Prüfung,
wird hier schon bald euer finales Rätsel erscheinen.`;

    function typeText(element, text, speed = 20, callback = null) {
      element.innerHTML = "";
      let i = 0;

      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "█";
      element.appendChild(cursor);

      const interval = setInterval(() => {
        if (i < text.length) {
          cursor.remove();
          element.append(document.createTextNode(text.charAt(i)));
          element.appendChild(cursor);
          i++;
        } else {
          clearInterval(interval);
          cursor.remove();
          if (callback) callback();
        }
      }, speed);
    }

    function runTransition(element, callback = null) {
      const lines = [
        "AUTHENTICATING...",
        "CHECKING KEY...",
        "DECRYPTING NEXT PROTOCOL...",
        "ACCESSING NEXT NODE..."
      ];

      let lineIndex = 0;
      element.innerHTML = "";

      function showNextLine() {
        if (lineIndex >= lines.length) {
          setTimeout(() => {
            if (callback) callback();
          }, 250);
          return;
        }

        const line = document.createElement("div");
        line.className = "transition-text";
        element.appendChild(line);

        let charIndex = 0;
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        cursor.textContent = "█";
        line.appendChild(cursor);

        const interval = setInterval(() => {
          if (charIndex < lines[lineIndex].length) {
            cursor.remove();
            line.append(document.createTextNode(lines[lineIndex].charAt(charIndex)));
            line.appendChild(cursor);
            charIndex++;
          } else {
            clearInterval(interval);
            cursor.remove();
            lineIndex++;
            setTimeout(showNextLine, 140);
          }
        }, 16);
      }

      showNextLine();
    }

    function normalizeInput(value) {
      return value.trim();
    }

    function normalizeLower(value) {
      return value.trim().toLowerCase();
    }

    function setStatus(text, isError = false) {
      const statusbar = document.getElementById("statusbar");
      statusbar.textContent = text;
      statusbar.style.color = isError ? "var(--error)" : "var(--muted)";
      statusbar.style.borderColor = isError ? "rgba(255,95,95,0.35)" : "var(--border)";
    }

    function showMainTextWithTransition(text, callback = null) {
      const block3 = document.getElementById("block3");
      const text3 = document.getElementById("text3");
      block3.classList.add("visible");
      text3.innerHTML = "";

      runTransition(text3, () => {
        typeText(text3, text, 20, callback);
      });
    }

    window.addEventListener("load", () => {
      typeText(document.getElementById("text1"), introText, 20, () => {
        document.getElementById("actions1").style.display = "flex";
        setStatus("STATUS: BEREIT");
      });
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      const block2 = document.getElementById("block2");
      block2.classList.add("visible");

      typeText(document.getElementById("text2"), startText, 20, () => {
        document.getElementById("codeArea").style.display = "block";
        document.getElementById("codeInput").focus();
        setStatus("STATUS: EINGABE AKTIV");
      });
    });

    function flashMessage(element, text, success = true) {
      element.textContent = text;
      element.className = success ? "message success" : "message error";
    }

    function checkCode() {
      const input = document.getElementById("codeInput");
      const message = document.getElementById("message");
      const solutionArea = document.getElementById("solutionArea");
      const solutionInput = document.getElementById("solutionInput");
      const solutionMessage = document.getElementById("solutionMessage");
      const value = normalizeInput(input.value);

      if (codeMap[value]) {
        flashMessage(message, "ACCESS GRANTED", true);
        setStatus("STATUS: ZUGANG GEWÄHRT");
        input.value = "";
        solutionMessage.textContent = "";

        showMainTextWithTransition(codeMap[value], () => {
          if (value === "Z4wA-N6kR") {
            solutionArea.style.display = "block";
            solutionInput.focus();
          } else {
            solutionArea.style.display = "none";
            document.getElementById("codeInput").focus();
          }
        });
      } else {
        flashMessage(message, "ACCESS DENIED", false);
        setStatus("STATUS: ZUGANG VERWEIGERT", true);
      }
    }

    function checkSolution() {
      const input = document.getElementById("solutionInput");
      const message = document.getElementById("solutionMessage");
      const value = normalizeLower(input.value);

      if (finalAnswers.includes(value)) {
        flashMessage(message, "ACCESS GRANTED", true);
        setStatus("STATUS: LÖSUNG AKZEPTIERT");
        input.value = "";
        showMainTextWithTransition(finalText);
      } else {
        flashMessage(message, "ACCESS DENIED", false);
        setStatus("STATUS: FALSCHE LÖSUNG", true);
      }
    }

    document.getElementById("checkBtn").addEventListener("click", checkCode);
    document.getElementById("solutionBtn").addEventListener("click", checkSolution);

    document.getElementById("codeInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkCode();
      }
    });

    document.getElementById("solutionInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkSolution();
      }
    });
  </script>
</body>
</html>
